name: PR Review Bot

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check ticket reference
        id: ticket
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Check for LP-XXX or TF-XXX in title or body
          if echo "$PR_TITLE $PR_BODY" | grep -qE '(LP|TF)-[0-9]+'; then
            echo "ticket_found=true" >> $GITHUB_OUTPUT
            TICKET=$(echo "$PR_TITLE $PR_BODY" | grep -oE '(LP|TF)-[0-9]+' | head -1)
            echo "ticket_id=$TICKET" >> $GITHUB_OUTPUT
          else
            echo "ticket_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for docs
        id: docs
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Check if any docs/ files changed
          DOCS_CHANGED=$(git diff --name-only origin/main...HEAD -- docs/ | wc -l)
          # Check if this is a feature PR
          IS_FEATURE=$(echo "$PR_TITLE" | grep -c "^feat" || true)
          
          if [ "$IS_FEATURE" -gt 0 ] && [ "$DOCS_CHANGED" -eq 0 ]; then
            echo "docs_missing=true" >> $GITHUB_OUTPUT
          else
            echo "docs_missing=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for migration
        id: migration
        run: |
          MIGRATION_CHANGED=$(git diff --name-only origin/main...HEAD -- supabase/migrations/ | wc -l)
          echo "has_migration=$([[ $MIGRATION_CHANGED -gt 0 ]] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Build check
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const ticketFound = '${{ steps.ticket.outputs.ticket_found }}' === 'true';
            const docsMissing = '${{ steps.docs.outputs.docs_missing }}' === 'true';
            const hasMigration = '${{ steps.migration.outputs.has_migration }}' === 'true';
            const ticketId = '${{ steps.ticket.outputs.ticket_id }}';
            
            let body = '## 🔱 PR Review Bot\n\n';
            let issues = [];
            
            // Ticket check
            if (ticketFound) {
              body += `✅ **Ticket:** ${ticketId}\n`;
            } else {
              body += '❌ **Ticket:** No LP-XXX reference found in title or description\n';
              issues.push('Missing ticket reference');
            }
            
            // Docs check
            if (docsMissing) {
              body += '⚠️ **Docs:** Feature PR with no docs/ changes — please add documentation\n';
              issues.push('Missing docs for feature');
            } else {
              body += '✅ **Docs:** OK\n';
            }
            
            // Migration check
            if (hasMigration) {
              body += '📦 **Migration:** New migration detected — remember to apply to remote DB\n';
            }
            
            // Build
            body += '✅ **Build:** Passed\n';
            
            if (issues.length > 0) {
              body += `\n### Action Required\n${issues.map(i => `- ${i}`).join('\n')}\n`;
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
